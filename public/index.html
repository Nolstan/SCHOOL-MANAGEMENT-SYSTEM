<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Management & AI Tutor</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="sidebar">
        <div class="logo">EduChain AI (Student)</div>
        <ul class="nav-links">
            <li class="active" data-page="dashboard" data-role="student">Dashboard</li>
            <li data-page="ai-tutor" data-role="student">AI Tutor</li>
            <li data-page="activities" data-role="student">Activities</li>
        </ul>
        <div class="user-info">
            <span id="username">Student</span>
            <button id="logout-btn">Logout</button>
        </div>
    </nav>

    <main class="content">
        <header class="top-bar">
            <h1 id="page-title">Dashboard</h1>
        </header>

        <section id="dashboard-page" class="page">
            <div class="activity-feed">
                <h2>Recent Announcements</h2>
                <div id="activities-list"></div>
            </div>
        </section>

        <section id="ai-tutor-page" class="page hidden">
            <div class="chat-container">
                <div id="chat-box"></div>
                <div class="input-row">
                    <input type="text" id="ai-input" placeholder="Ask the AI Tutor anything...">
                    <button id="ai-send">Ask</button>
                </div>
            </div>
        </section>

        <!-- More sections will be dynamically handled by JS -->
    </main>

    <script src="js/app.js"></script>
</body>

</html>
